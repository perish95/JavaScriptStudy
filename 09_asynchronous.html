<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<body>
  <!-- XMLHttpRequest -->
  <form id="agify-form">
    <label for="name">이름</label>
    <input type="text" id="name">
    <button type="submit">제출</button>
  </form>
  <div id="agify-result">여기에 결과가 노출됩니다.</div>
  <script>
    const agifyForm = document.getElementById('agify-form');
    agifyForm.addEventListener('submit', e => {
      e.preventDefault(); // 폼 제출은 동기 처리 방식이므로, 비동기 요청 시 항상 취소해야 합니다.
      
      // 비동기 요청 과정
      const xhr = new XMLHttpRequest();
      xhr.open('get',`https://api.agify.io/?name=${document.getElementById('name').value}`);
      xhr.addEventListener('readystatechange',() => {
        if(xhr.readyState === 4){
          if(xhr.status === 200){
            const res = xhr.responseText  // 응답 결과가 JSON인 경우 "JSON 문자열"로 받아옵니다.
            const obj = JSON.parse(res);  //"JSON 문자열" -> JS 객체로 변환

            document.getElementById('agify-result').textContent = `count=${obj.count}, name=${obj.name}, age=${obj.age}`;
          }
        }
      });
      xhr.send();
    });
  </script>

  <!-- Promise 객체 -->
  <button id="btn">요청</button>
  <script>
    document.getElementById('btn').addEventListener('click', e=> {
      let res;  //undefined 상태
      const xhr = new XMLHttpRequest();
      xhr.open('get','https://jsonplaceholder.typicode.com/todos/1');
      xhr.addEventListener('readystatechange', () =>{
        if(xhr.readyState === 4){
          if(xhr.status === 200){
            const {title} = JSON.parse(xhr.responseText); //객체 구조 분해 할당
            res = title;
          }
        }
      });
      xhr.send();
      console.log(res); // 비동기 결과를 기다리지 않기 때문에 undefined 그대로 출력
    });
  </script>

  <script>
    // Promise 도입

    // 1. Promise 생성 (Promise 생성한 뒤 반환하는 함수)
    function fectData(url){
      return new Promise((resolve, reject) => {
        // 비동기 작업은 Promise 내부에서 진행
        const xhr = new XMLHttpRequest();

        xhr.open('get',url);
        xhr.addEventListener('readystatechange', () =>{
          if(xhr.readyState === 4){
            if(xhr.status === 200){
              // 약속 이행(fullfilled)
              resolve(JSON.parse(xhr.responseText)); //객체 구조 분해 할당
            }else{
              // 약속 거부
              reject(new Error(`요청 실패(상태 코드: ${xhr.status})`));
            }
          }
        });
        xhr.send();
      });
    }

    // 2. Promise 소비 (함수의 반환 값을 받아서 소비)
    document.getElementById('btn').addEventListener('click', e => {

    fectData(`https://jsonplaceholder.typicode.com/todos/1`) // Promis 받아 옴
      .then((obj) => {  //.then(() => {}, () => {}) 성공과 실패를 둘 다 해결할 수 있다.
        console.log('API 응답 데이터: ', obj);
      }) 
      .catch((error) => {
        console.error(error.message);
      })
    });
  </script>

  <!-- async 함수와 await 문 -->
  <button id="btn3">요청</button>
  <script>
    document.getElementById('btn3').addEventListener('click', e => {
      fetchUser();
    });

    async function fetchUser(){
      // TODO 요청
      const res = await fetch('https://jsonplaceholder.typicode.com/todos/1');
      const todo = await res.json();
      // user 요청
      const res2 = await fetch(`https://jsonplaceholder.typicode.com/users/${todo.userId}`);
      const user = await res2.json();

      console.log(user);
    }
    
  </script>
