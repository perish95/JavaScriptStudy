<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>

    //객체 리터럴 표기법 (중괄호 {})
    {
      const person = {
        name: "홍킬동",
        age: 30, // 후행 쉼표

      }
    }

    // 속성 (프로퍼티: Property)
    {
      const car = {
        model: 'Genesis', //key: value => Property
        price: 5000,
        'car-maker': 'Hyundai',
        year: 2026,
        owner: {
          name: '홍길동', //후행 쉼표 가능, 요즘 트렌드

        }
      }

      // Property Value 가져오기
      // 1. Dot (.)
      console.log(car.model);
      // 2. Bracket ([]): 특수한 상황 (key에 공백 or 하이픈 포함, Key가 변수에 저장된 경우)
      console.log(car['model']);
      console.log(car['price']);
      console.log(car['car-maker']);
      const key = 'year';
      console.log(car[key]);
      // 3. Optional Chaining
      // 평가 대상이 없으면? 원래는 오류가 발생하지만, 오류 대신 undefined를 반환하는 방법
      console.log(car.owner.name);
      console.log(car?.member?.name);

      // Property 다루기
      // 없는 Key에 값을 할당하면: 새로 생성
      // 있는 Key에 값을 할당하면: 기존 값 수정
      const book = {} // 빈 객체
      book.title = '졸려';
      console.log(book.title);
      book.title = '개졸려';
      console.log(book);

      // Property Shorthand
      {
        const zipCode = '12345';
        const street = '강남대로';
        // Key, Value가 같은 이름인 경우 단축 표기법 가능
        const address= {
          zipCode, //: zipCode,
          street, //: street,
        }
        console.log(address);
      }

      // 객체 구조 분해 할당 (Object Destructuring Assignment) *****
      {
        const qna = {
          q: '한국의 수도는?',
          a: '서울',
        };

        // 구조 분해 할당
        const {q, a} = qna;
        console.log(q, a);

        const {q: question, a: answer} = qna;
        console.log(question, answer);

        // 간단한 연습(중요)
        function fnPrintUser({id, pw}){
          console.log(id, pw);
        }

        const user = {
          id : 'admin',
          pw: '1234',
        }
        fnPrintUser(user);
      }

      {
        // 나머지 속성 (Rest Property)
        // 말 줄임표(...) : 할당 연산자(=) 기준으로 왼쪽에 배치, 값을 전달받는 쪽
        const computer = {
          cpu:'m4',
          ram:'8g',
          ssd:'1gb',
        }

        const {cpu, ...rest } = computer; //computer에서 cpu만 가져가고 나머지는 rest가 가져간다.
        console.log(cpu); // 출력결과 : m4
        console.log(rest);// 출력결과 : {ram: '8g', ssd: '1gb'}

      }

      // 전개 구문(Spread Syntax)
      // 말 줄임표(...) : 할당 연산자(=) 기준으로 오른쪽에 배치, 값을 전달하는 쪽
      {
        const phone = {
          model: 'galaxy',
          size: '5 inch',
        }
        // 이 문법을 많이 사용
        const smartPhone = { 
          ...phone, // phone 객체의 프로퍼티를 펼쳐라
          size:'6 inch',
        }
        console.log(smartPhone);
      }

    }

    // this
    // 어떤 함수를 호출하는 주체
    {
      // 일반 함수 this 바인딩 확인
      function print(){
          console.log('print 호출:', this);
      }
      print(); // 호출하는 건: 전역 객체(window)

      // 메서드(객체가 가진 함수)의 this 바인딩
      const car = {
        model: 'Ray',
        drive: function () {
          console.log('drive:', this);
          console.log(this.model);
        }
      }
      car.drive();
    }

    // 객체 생성자 함수
    // 생성자 함수는 PascalCase 권장
    {
      function Office(location){
        // this 바인딩: 생성자 함수로 생성하는 객체에 연결됨
        this.location = location;
      }

      const office1 = new Office('101호');
      const office2 = new Office('201호');
      console.log(office1);
      console.log(office2 instanceof Office);
    }

    // 프로토타입
    // 모든 객체가 가지는 부모 타입의 객체를 의미함
    // 프로토타입에는 공유 데이터를 넣고 사용함

    {
      const member = {
        name:'Kim',
        age:30,
      }
      console.log(member.toString()); // 프로토타입이 지원

      // 프로토타입이 필요한 경우
      // 생성자 함수와 연관지어 생각
      function Coffee(store){
        this.store = store;
        // this.info = function() { //이 구성은 객체마다 동일한 메서드를 가지므로, 메모리 낭비
        //   console.log(`${this.store}에서 파는 커피`);
        // }

      }

      // Coffee 생성자 함수의 메서드를 프로토타입에 등록(공유 영역에 등록)
      Coffee.prototype.info = function(){
        console.log(`${this.store}에서 파는 커피`);
      }

      const coffee1 = new Coffee('메가');
      const coffee2 = new Coffee('컴포즈');
      coffee1.info();
      coffee2.info();
      console.log(coffee1);
    }

  </script>
  
</body>
</html>
