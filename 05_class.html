<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    //카트 아이템
    class CartItem{
      //private field
      #quantity;
      #price;

      // Constructor
      constructor(name, price, quantity = 1){ //quantity를 deault 값을 설정
        this.name = name;  // 일반 프로퍼티
        //this.#price = price;  // private 프로퍼티에 전달 (잘못된 값의 대비가 안 됨)
        this.price = price;  
        this.quantity = quantity;  // setter를 거쳐 #quantity에 전달
      }

      // Getter & Setter
      get quantity(){
        return this.#quantity;
      }

      set quantity(value){
        if(!Number.isInteger(value) || value < 1){
          console.error('수량은 최소 1개 이상의 정수이여야 합니다.');
          return;
        }
        this.#quantity = value;
      }

      get price(){
        return this.#price;
      }

      set price(value){
        if(value < 0){
          console.error('가격은 0보다 작을 수 없습니다.');
          return;
        }
        this.#price = value;
      }

      // 총 가격 반환 메서드
      getTotalPrice(){
        return this.#price * this.#quantity;
      }

      // 정보 출력 메서드
      getSummary(){
        return `${this.name} | 단가: ${this.price} | 수량: ${this.quantity} | 총가격: ${this.getTotalPrice()}`;
      }

      addQuantity(amount){
        if(amount <= 0){
          console.error('추가 수량을 0 이상 적어야합니다.');
          return;
        }
        this.quantity += amount; // Setter 호출함
      }
    }

    // 할인 카트 아이템
    class DiscountCartItem extends CartItem{
      #discountRate

      // 생성자
      constructor (name, price, quantity = 1 ,discountRate = 0){
        super(name, price, quantity);
        this.discountRate = discountRate;
      }

      // Getter & Setter
      get discountRate(){
        return this.#discountRate;
      }

      set discountRate(value){
        if(value < 0 || value > 100){
          console.error('음수는 안 받아용~');
          return;
        }

        this.#discountRate = value;
      }

      // 메서드 오버라이드:getTotalPrice
      getTotalPrice(){
        const temp = super.getTotalPrice();
        return temp * this.discountRate * 0.01;
      }

      getSummary(){
        return `${super.getSummaty()} | 할인율: ${this.discountRate}%`;
      }

    }
    // 인스턴스 생성 (생성자 호출)
      const item = new CartItem('TV',500000);
      
      console.log(item);

      item.addQuantity(1);
      console.log(item.getSummary());

      item.price = -100000;
      item.quantity = 1.5;

      // 상속 테스트
      const item2 = new DiscountCartItem('Tv', 500000, 1, 50);

      console.log(item2);
      console.log(item2.getTotalPrice());

  
  </script>
</body>
</html>
